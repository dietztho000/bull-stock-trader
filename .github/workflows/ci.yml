name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run shellcheck on all scripts
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y shellcheck
          shellcheck -x --source-path=SCRIPTDIR scripts/*.sh

  ssot-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify routines are in sync with .claude/commands
        run: |
          bash scripts/build-routines.sh
          if ! git diff --exit-code routines/; then
            echo "::error::routines/ is out of sync with .claude/commands/."
            echo "Run 'bash scripts/build-routines.sh' locally and commit the result."
            exit 1
          fi

  alpaca-syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Bash syntax check
        run: |
          for f in scripts/*.sh; do
            bash -n "$f" || exit 1
          done

  dashboard:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: dashboard/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm typecheck
      - name: Unit tests
        run: pnpm test
      - name: Next.js build
        # Catches Server Component / dynamic-import / module-graph issues
        # that tsc --noEmit doesn't see (e.g. importing a "use client" hook
        # into a server component, or a missing recharts dependency).
        run: pnpm build
        env:
          # Build runs in CI without real Alpaca creds; the dashboard's
          # server components don't fetch at build time, but route handlers
          # that touch the env need a sentinel so they fail fast in dev and
          # tree-shake in build. This won't block the build either way.
          BOT_MODE: paper
          NEXT_TELEMETRY_DISABLED: "1"
